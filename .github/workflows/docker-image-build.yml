name: Docker image
on:
  workflow_run:
    workflows:
      - Maven build
    types:
      - completed
jobs:
  resolve-distribution:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      available: ${{ steps.check-artifact.outputs.available }}
    steps:
      - name: Check release distribution artifact
        id: check-artifact
        uses: actions/github-script@v7
        with:
          script: |
            const artifactName = 'speech-to-text-service-distribution';
            const { owner, repo } = context.repo;
            const run_id = context.payload.workflow_run.id;
            const { data } = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id,
            });
            const artifact = data.artifacts.find((entry) => entry.name === artifactName && !entry.expired);
            core.setOutput('available', artifact ? 'true' : 'false');
  create-image:
    needs: resolve-distribution
    if: needs.resolve-distribution.outputs.available == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout release
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Download service distribution
        uses: actions/download-artifact@v5
        with:
          name: speech-to-text-service-distribution
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          path: dist
      - name: Unpack service distribution
        run: unzip -q dist/*.zip -d dist/app
