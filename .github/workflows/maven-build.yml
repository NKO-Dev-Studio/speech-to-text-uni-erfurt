name: Maven build
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [ "**" ]
  create:
jobs:
  deploy:
    if: github.ref == 'refs/heads/main' || github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment: maven-release-environment
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
          server-id: 'central'
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
      - name: Build with Maven
        run: mvn deploy -P deploy-maven-central
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEYNAME: ${{ secrets.GPG_KEYNAME }}
      - name: Upload service distribution
        uses: actions/upload-artifact@v4
        with:
          name: speech-to-text-service-distribution
          path: speech-to-text-service-uni-erfurt/target/*-distribution.zip
          if-no-files-found: error
          retention-days: 7
      - name: Update dependency graph
        if: github.ref == 'refs/heads/main'
        uses: advanced-security/maven-dependency-submission-action@v5
  test:
    if: github.ref != 'refs/heads/main' && github.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Run Maven tests
        run: mvn test
